name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Project Structure
        run: |
          chmod +x setup-project.sh
          bash setup-project.sh

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Build APK
        run: |
          cd quran-app
          gradle assembleRelease --no-daemon

      - name: Sign APK
        run: |
          cd quran-app
          keytool -genkey -v -keystore release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias quranapp -storepass quranapp123 -keypass quranapp123 -dname "CN=Quran App,O=Meshari,C=SA"
          ${ANDROID_HOME}/build-tools/34.0.0/apksigner sign --ks release-key.jks --ks-pass pass:quranapp123 --key-pass pass:quranapp123 --out quran-signed.apk app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: quran-signed-apk
          path: quran-app/quran-signed.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v3.0.0
          name: "القرآن الكريم v3.0.0"
          files: quran-app/quran-signed.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
